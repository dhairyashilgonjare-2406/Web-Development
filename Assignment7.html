<h2>About Amazon</h2>

<p>Click the text link below to visit Amazon website.</p>

<!-- Text Link -->
<a href="https://www.amazon.in" target="_blank">
Visit Amazon Website
</a>

<br><br>

<h3>Click the Image to Visit Amazon</h3>

<!-- Image Link -->
<a href="https://www.amazon.in" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"
alt="Amazon Logo" width="300">
</a>

<br><br>

<h3>Image Map Example</h3>

<p>Click on different parts of the image:</p>

<!-- Image Map -->
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"
usemap="#amazonmap" width="300">

<map name="amazonmap">

<!-- Area 1 -->
<area shape="rect" coords="0,0,150,100"
href="https://www.amazon.in/gp/help/customer/display.html"
alt="Amazon Help">

<!-- Area 2 -->
<area shape="rect" coords="150,0,300,100"
href="https://www.amazon.jobs"
alt="Amazon Careers">

</map>

</body>
