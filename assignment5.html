

<!DOCTYPE html>
<html>
<head>
    <title>Column Frame Example</title>
</head>

<body>

    <h2>Column Frames using iframe</h2>

    <!-- First Column -->
    <iframe src="https://www.google.com"
            width="32%" 
            height="400">
    </iframe>

    <!-- Second Column -->
    <iframe src="https://www.wikipedia.org"
            width="32%" 
            height="400">
    </iframe>

    <!-- Third Column -->
    <iframe src="https://www.opera.com"
            width="32%" 
            height="400">
    </iframe>

</body>
</html>
